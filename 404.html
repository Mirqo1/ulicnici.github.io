<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uličníci Behajú | Bežecký Blog</title>
    
    <!-- SEO a Zdieľanie (Facebook/Twitter) -->
    <meta name="description" content="Náš bežecký blog o pretekoch, výbave, tréningu a bežeckých trasách v našom okolí. Pridajte sa k Uličníkom!">
    <meta property="og:title" content="Uličníci Behajú | Bežecký Blog">
    <meta property="og:description" content="Náš bežecký blog o pretekoch, výbave, tréningu a bežeckých trasách v našom okolí.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mirqo1.github.io/ulicnici.github.io/">
    <!-- Ak nemáš faviconu (ikonku hore v lište), tento riadok ju pripraví na neskôr -->
    <link rel="icon" href="data:;base64,iVBORw0KGgo="> 

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-container">
            <div class="header-spacer"></div> 
            
            <!-- SEO oprava: Odkaz domov je teraz cez <a> tag, nie len cez onClick na h1 -->
            <a href="/" data-link style="text-decoration: none; flex: 1; text-align: center;">
                <h1>Uličníci <span>Behajú</span></h1>
            </a>
            
            <form class="search-form" onsubmit="handleSearch(event)">
                <label for="search-input" style="display:none;">Hľadať článok</label>
                <input type="text" id="search-input" placeholder="Hľadať článok...">
                <button type="submit" title="Vyhľadať" aria-label="Vyhľadať">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </form>
        </div>
    </header>

    <main>
        <button id="back-btn" onclick="navigateTo('')">← Späť na články</button>

        <div id="blog-layout">
            <div id="featured-container"></div>
            <div id="older-container" class="older-grid"></div>

            <nav class="pagination" aria-label="Stránkovanie">
                <button id="prev-btn" class="page-btn" aria-label="Predchádzajúca strana" onclick="changePage(-1)">
                    <span class="arrow left"></span>
                </button>
                <span id="page-number">1 / 1</span>
                <button id="next-btn" class="page-btn" aria-label="Ďalšia strana" onclick="changePage(1)">
                    <span class="arrow right"></span>
                </button>
            </nav>
        </div>

        <article id="single-post">
            <h2 id="post-full-title"></h2> <!-- Zmenené z H1 na H2, lebo H1 má byť na stránke len raz (názov blogu) -->
            <div id="post-full-meta"></div>
            <div id="post-full-body"></div>
            
            <div class="share-section">
                <div class="share-title">Zdieľať článok</div>
                <div class="share-buttons">
                    <button class="share-btn share-fb" onclick="shareFacebook()">Facebook</button>
                    <button class="share-btn share-x" onclick="shareX()">X / Twitter</button>
                    <button class="share-btn share-ig" id="ig-btn" onclick="shareInstagram()">Instagram</button>
                    <button class="share-btn" id="copy-btn" onclick="copyLink()">Skopírovať odkaz</button>
                </div>
            </div>
        </article>
    </main>

    <footer>
        &copy; 2026 Uličníci Behajú. Všetky práva vyhradené.
    </footer>

    <script src="script.js"></script>
</body>
</html>
