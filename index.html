<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uličníci Behajú | Bežecký Blog</title>
    <link rel="stylesheet" href="style.css">
    <meta property="og:title" content="Uličníci Behajú | Bežecký Blog">
    <meta property="og:description" content="Náš bežecký blog o pretekoch, výbave a tratiach v našom okolí.">
    <meta property="og:image" content="https://tvojweb.sk/cesta-k-nejakemu-peknemu-uvodnemu-obrazku.jpg">
    <meta property="og:url" content="https://tvojweb.sk">
    <meta name="twitter:card" content="summary_large_image">
</head>
<body>

    <header>
        <div class="header-container">
            <!-- Prazdny blok pre dokonalé vycentrovanie -->
            <div class="header-spacer"></div> 
            
            <!-- Vycentrovaný nadpis -->
            <h1 onclick="navigateTo('')">Uličníci <span>Behajú</span></h1>
            
            <!-- Vyhľadávací formulár zarovnaný vpravo -->
            <form class="search-form" onsubmit="handleSearch(event)">
                <input type="text" id="search-input" placeholder="Hľadať článok...">
                <button type="submit" title="Vyhľadať">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </form>
        </div>
    </header>

    <main>
        <button id="back-btn" onclick="navigateTo('')">← Späť na články</button>

        <div id="blog-layout">
            <div id="featured-container"></div>
            <div id="older-container" class="older-grid"></div>

            <div class="pagination">
                <button id="prev-btn" class="page-btn" onclick="changePage(-1)">
                    <span class="arrow left"></span>
                </button>
                <span id="page-number">1 / 1</span>
                <button id="next-btn" class="page-btn" onclick="changePage(1)">
                    <span class="arrow right"></span>
                </button>
            </div>
        </div>

        <article id="single-post">
            <h1 id="post-full-title"></h1>
            <div id="post-full-meta"></div>
            <div id="post-full-body"></div>
            
            <div class="share-section">
                <div class="share-title">Zdieľať článok</div>
                <div class="share-buttons">
                    <button class="share-btn share-fb" onclick="shareFacebook()">Facebook</button>
                    <button class="share-btn share-x" onclick="shareX()">X / Twitter</button>
                    <button class="share-btn share-ig" id="ig-btn" onclick="shareInstagram()">Instagram</button>
                    <button class="share-btn" id="copy-btn" onclick="copyLink()">Skopírovať odkaz</button>
                </div>
            </div>
        </article>
    </main>

    <footer>
        &copy; 2026 Uličníci Behajú. Všetky práva vyhradené.
    </footer>

    <script src="script.js"></script>
</body>
</html>
